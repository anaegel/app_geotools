name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run example script tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-activate-base: false
          python-version: 3.12
          environment-file: environment.yml
          activate-environment: geotools-test
          always-activate: true

      - name: Install pytest
        run: conda install -y pytest

      - name: Run pytest
        run: python -m pytest tests/test_examples.py -q
